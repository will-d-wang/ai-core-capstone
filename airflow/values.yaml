# Apache Airflow official Helm chart values (minimal, K8sExecutor)
executor: "KubernetesExecutor"

postgresql:
  enabled: false

data:
  metadataConnection:
    protocol: postgresql
    host: postgres.ai-core-pipeline.svc.cluster.local
    port: 5432
    db: airflow
    user: airflow
    pass: airflow
    sslmode: disable

webserver:
  service:
    type: ClusterIP

scheduler:
  replicas: 1

workers:
  enabled: false

triggerer:
  enabled: true

dags:
  gitSync:
    enabled: true
    repo: "https://github.com/<YOUR_GITHUB>/<YOUR_REPO>.git"
    branch: "main"
    subPath: "dags"
    wait: 30
    depth: 1

extraPipPackages:
  - "apache-airflow-providers-cncf-kubernetes"
  - "apache-airflow-providers-amazon"
  - "boto3"
  - "psycopg2-binary"

createUserJob:
  useHelmHooks: true
users:
  - username: admin
    password: admin
    role: Admin
    email: admin@example.com
    firstName: Admin
    lastName: User
